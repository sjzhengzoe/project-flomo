name: Deploy to Tencent COS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "22"

      - name: Deploy to Tencent Cloud Server
        uses: appleboy/ssh-action@master
        with:
          host: 106.52.199.208
          username: ubuntu
          key: ${{ secrets.OPENSSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/project-flomo
            git pull
            corepack enable
            corepack prepare pnpm@8.15.9 --activate
            pnpm install --no-frozen-lockfile
            sudo rm -rf dist
            pnpm run build
            if systemctl list-unit-files | grep -q '^project-flomo-server.service'; then
              sudo systemctl restart project-flomo-server
            else
              echo "project-flomo-server.service is not installed; skip server restart"
            fi
            sudo nginx -s reload
