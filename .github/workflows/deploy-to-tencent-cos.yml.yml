name: Deploy human_draft

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy to Tencent Cloud Server
        uses: appleboy/ssh-action@master
        with:
          host: 106.52.199.208
          username: ubuntu
          key: ${{ secrets.OPENSSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/human_draft
            git pull --ff-only origin main
            corepack pnpm@9.10.0 install --frozen-lockfile
            corepack pnpm@9.10.0 run build
            sudo systemctl restart human-draft-server
            sudo systemctl is-active --quiet human-draft-server
            curl --fail --silent --show-error --retry 5 --retry-connrefused --retry-delay 2 http://127.0.0.1:3000/api/health > /dev/null
            sudo nginx -s reload
