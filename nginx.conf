# HTTP 重定向到 HTTPS（可选，若希望强制走 HTTPS 可保留）
server {
    listen 80;
    server_name gufeifei.cn www.gufeifei.cn;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name gufeifei.cn www.gufeifei.cn;

    # 证书：用「完整链」bundle，否则浏览器会提示不安全
    ssl_certificate     /etc/nginx/ssl/gufeifei.cn/gufeifei.cn_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/gufeifei.cn/gufeifei.cn.key;

    root /home/ubuntu/project-flomo/dist;
    index index.html index.htm;
    client_max_body_size 12m;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
